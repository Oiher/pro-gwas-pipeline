# Cross-cohort METAL meta-analysis: combine matching phenotypes across
# multiple cohorts (e.g. UPDRS_NSPARK + UPDRS_ICEBERG + UPDRS_COPN). One
# glob spans all cohorts x all phenotypes; run_metal.nf groups matched
# files by --metal_pheno_name (suffix match on "_<phenotype>_allresults.tsv")
# and runs one METAL invocation per phenotype automatically.
#
# Usage:
#   nextflow run run_metal.nf -profile gcb_final -params-file conf/examples/metal_cross_cohort.yml

metal_input: "gs://<YOUR_BUCKET>/analyses/*/UPDRS_*_CS/gwas_results/glm/EUR_case_*_allresults.tsv"
metal_pheno_name: "UPDRS_pI,UPDRS_pII,UPDRS_pIII"
metal_outdir: "gs://<YOUR_BUCKET>/META/UPDRS"
metal_prefix: "UPDRS_META"
gcb_container: "europe-west4-docker.pkg.dev/gp2-release-terra/long-gwas/long-gwas:latest"
gcb_use_private_address: false
